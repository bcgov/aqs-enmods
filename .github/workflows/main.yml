name: Update AQS PROD performance logs

on:
  #schedule:
  #  - cron: '51 12 * * *'  # Runs at 11:51 UTC every day - 3:51am Pacific
  workflow_dispatch:
    
jobs:
  run-r:
    runs-on: ubuntu-latest
    environment: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up R
        uses: r-lib/actions/setup-r@v2

      - name: Cache R packages #cache packages to make future runs faster
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: aws.s3, dplyr, httr, jsonlite, tidyverse, dplyr, lubridate, stringr, readr

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libcurl4-openssl-dev libssl-dev libxml2-dev

      - name: Run R script
        env:
            AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
            AWS_ACCESS_KEY: ${{ secrets.AWS_ACCESS_KEY }}
            AQI_AWS_ACCESS_KEY: ${{ secrets.AQI_AWS_ACCESS_KEY }}
            AQI_AWS_SECRET_ACCESS_KEY: ${{ secrets.AQI_AWS_SECRET_ACCESS_KEY }}
        run: Rscript utils/AQS_Performance_Logs.R
